<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook – Log In</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid vh-100 d-flex align-items-center">
        <div class="row w-100 justify-content-center align-items-center">

            <!-- Left Section -->
            <div class="col-md-6 text-center text-md-start mb-5 mb-md-0">
                <h1 class="fb-logo">facebook</h1>
                <p class="fs-4">
                    Facebook helps you connect and share with the people in your life.
                </p>
            </div>

            <!-- Right Section -->
            <div class="col-md-4">
                <div class="card p-4 shadow">
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control form-control-lg" placeholder="Email address or phone number">
                        </div>

                        <div class="mb-3">
                            <input type="password" class="form-control form-control-lg" placeholder="Password">
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Log In
                            </button>
                        </div>

                        <div class="text-center mb-3">
                            <a href="#" class="text-decoration-none">Forgotten password?</a>
                        </div>

                        <hr>

                        <div class="d-grid">
                            <button type="button" class="btn btn-success btn-lg">
                                Create New Account
                            </button>
                        </div>
                    </form>
                </div>

                <p class="text-center mt-3">
                    <strong>Create a Page</strong> for a celebrity, brand or business.
                </p>
            </div>

        </div>
    </div>

</body>
</html>
