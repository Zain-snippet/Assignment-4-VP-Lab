<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-3">
    <a class="navbar-brand fb-logo" href="#">facebook</a>

    <form class="d-flex ms-3">
        <input class="form-control" type="search" placeholder="Search Facebook">
    </form>

    <div class="ms-auto d-flex align-items-center">
        <span class="me-3">Home</span>
        <span class="me-3">Friends</span>
        <span>Profile</span>
    </div>
</nav>

<!-- ================= MAIN LAYOUT ================= -->
<div class="container-fluid mt-3">
    <div class="row">

        <!-- ===== LEFT SIDEBAR ===== -->
        <div class="col-md-3 d-none d-md-block">
            <div class="sidebar">
                <p><strong>John Doe</strong></p>
                <p>Friends</p>
                <p>Groups</p>
                <p>Marketplace</p>
                <p>Watch</p>
            </div>
        </div>

        <!-- ===== CENTER FEED ===== -->
        <div class="col-md-6">

            <!-- Create Post -->
            <div class="card mb-3 p-3 shadow-sm">
                <input type="text" class="form-control" placeholder="What's on your mind, John?">
            </div>

            <!-- Post 1 -->
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">Nanga Parbat</h6>
                    <p class="card-text">This is a sample Facebook post layout using Bootstrap.</p>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-light btn-sm">Like</button>
                        <button class="btn btn-light btn-sm">Comment</button>
                        <button class="btn btn-light btn-sm">Share</button>
                    </div>
                </div>
            </div>

            <!-- Post 2 -->
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">Himalaya</h6>
                    <p class="card-text">Another example post. .</p>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-light btn-sm">Like</button>
                        <button class="btn btn-light btn-sm">Comment</button>
                        <button class="btn btn-light btn-sm">Share</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- ===== RIGHT SIDEBAR ===== -->
        <div class="col-md-3 d-none d-md-block">
            <div class="sidebar">
                <h6>Contacts</h6>
                <p>Ali</p>
                <p>Ahmed</p>
                <p>Sarah</p>
                <p>Zara</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
