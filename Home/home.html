<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-3 sticky-top">
    <a class="navbar-brand fb-logo" href="#">facebook</a>

    <form class="d-flex ms-3">
        <input class="form-control" type="search" placeholder="Search Facebook">
    </form>

    <div class="ms-auto d-flex align-items-center nav-links">
        <span class="me-3 nav-item-link active">Home</span>
        <span class="me-3 nav-item-link">Friends</span>
        <span class="nav-item-link">Profile</span>
    </div>
</nav>

<!-- ================= MAIN LAYOUT ================= -->
<div class="container-fluid mt-3">
    <div class="row">

        <!-- ===== LEFT SIDEBAR ===== -->
        <div class="col-md-3 d-none d-md-block">
            <div class="sidebar">
                <p><strong>John Doe</strong></p>
                <p>Friends</p>
                <p>Groups</p>
                <p>Marketplace</p>
                <p>Watch</p>
            </div>
        </div>

        <!-- ===== CENTER FEED ===== -->
        <div class="col-md-6">

            <!-- Create Post -->
            <div class="card mb-3 p-3 shadow-sm create-post-card">
                <input type="text" class="form-control" placeholder="What's on your mind, John?">
            </div>

            <!-- Post 1 -->
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title mb-1">Nanga Parbat</h6>
                    <small class="text-muted d-block mb-2">2 hrs ago</small>
                    <p class="card-text">This is a sample Facebook post layout using Bootstrap.</p>
                    <a class="post-image-link" href="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80" target="_blank" rel="noopener noreferrer">
                        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80" alt="Mountain view" class="img-fluid rounded post-image mb-2">
                    </a>
                    <a class="small text-decoration-none" href="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80" target="_blank" rel="noopener noreferrer">Open full image</a>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-light btn-sm action-btn">Like</button>
                        <button class="btn btn-light btn-sm action-btn">Comment</button>
                        <button class="btn btn-light btn-sm action-btn">Share</button>
                    </div>
                </div>
            </div>

            <!-- Post 2 -->
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title mb-1">Himalaya</h6>
                    <small class="text-muted d-block mb-2">5 hrs ago</small>
                    <p class="card-text">Another example post. .</p>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-light btn-sm action-btn">Like</button>
                        <button class="btn btn-light btn-sm action-btn">Comment</button>
                        <button class="btn btn-light btn-sm action-btn">Share</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- ===== RIGHT SIDEBAR ===== -->
        <div class="col-md-3 d-none d-md-block">
            <div class="sidebar">
                <h6>Contacts</h6>
                <p>Ali</p>
                <p>Ahmed</p>
                <p>Sarah</p>
                <p>Zara</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
